[pytest]
# SentimentTracker — pytest configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short traceback and extra test summary
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests (require running node)
    direct: marks direct-mode tests (no node required)
